    enol: 
      addresses: [192.168.1.100/24] 
      dhcp4: false
      optional: true
      gateway4: 192.168.1.1
      nameservers:
        addresses: [192.168.1.1,114.114.114.114,8.8.8.8,8.8.4.4]
  version: 2
  renderer: NetworkManager
  
